function calcEstado(p){
  if(p.estadoManual==='baja')return'baja';
  const res=ETAPAS.map(e=>(p.etapas[e.key]||{}).resultado||'');
  if(res.some(r=>r==='NAD'))return'nad';
  if(res.some(r=>r==='NAT'))return'nat';
  if(res.filter(r=>r!=='').length===ETAPAS.length&&res.every(r=>r==='Apto'))return'apto_final';
  return'en_proceso';
}

function emptyP(id){
  const etapas={};
  ETAPAS.forEach(e=>{etapas[e.key]={resultado:'',causal:'',detalle:'',puntaje:'',nota:''};});
  return{id,nombre:'',dni:'',sexo:'',edad:null,curso:'',estadoManual:'',etapas};
}

function compress(p){
  const e={};
  ETAPAS.forEach(et=>{
    const v=p.etapas[et.key]||{};
    if(v.resultado||v.causal||v.detalle||v.puntaje){
      e[et.key]={};
      if(v.resultado)e[et.key].r=v.resultado;
      if(v.causal)e[et.key].c=v.causal;
      if(v.detalle)e[et.key].d=v.detalle;
      if(v.puntaje)e[et.key].p=v.puntaje;
      if(v.nota)e[et.key].n=v.nota;
    }
  });
  const r={id:p.id,n:p.nombre,d:p.dni,e};
  if(p.sexo)r.s=p.sexo;
  if(p.edad)r.a=p.edad;
  if(p.curso)r.c=p.curso;
  if(p.estadoManual)r.em=p.estadoManual;
  return r;
}

function expand(r){
  const etapas={};
  ETAPAS.forEach(et=>{
    const v=(r.e||{})[et.key]||{};
    etapas[et.key]={resultado:v.r||'',causal:v.c||'',detalle:v.d||'',puntaje:v.p||'',nota:v.n||''};
  });
  return{id:r.id,nombre:r.n||'',dni:r.d||'',sexo:r.s||'',edad:r.a||null,curso:r.c||'',estadoManual:r.em||'',etapas};
}

function setSyncStatus(state,msg){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-msg');
  if(dot)dot.className='sync-dot'+(state==='ok'?' ok':state==='err'?' err':state==='loading'?' loading':'');
  if(txt)txt.textContent=msg;
}
async function pushData(){
  setSyncStatus('loading','Guardando...');
  try{
    const res=await fetch('https://api.jsonbin.io/v3/b/'+syncBin,{
      method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':syncKey,'X-Bin-Versioning':'false'},
      body:JSON.stringify({policia:data.policia.map(compress),bomberos:data.bomberos.map(compress),nextId,cupo})
    });
    if(!res.ok)throw new Error(res.status);
    setSyncStatus('ok','Guardado a las '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){setSyncStatus('err','Error al guardar — revisá la conexión');}
}
async function pullData(){
  try{
    const res=await fetch('https://api.jsonbin.io/v3/b/'+syncBin+'/latest',{headers:{'X-Master-Key':syncKey}});
    if(!res.ok)throw new Error(res.status);
    const json=await res.json();
    const r=json.record;
    if(r&&r.policia){
      data={policia:(r.policia||[]).map(expand),bomberos:(r.bomberos||[]).map(expand)};
      nextId=r.nextId||1;
      if(r.cupo)cupo=r.cupo;
      localStorage.setItem('dash-v1',JSON.stringify({data:{policia:data.policia.map(compress),bomberos:data.bomberos.map(compress)},nextId,cupo}));
      render();
      setSyncStatus('ok','Actualizado a las '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}));
    }
  }catch(e){setSyncStatus('err','Error al conectar');}
}
function saveData(){
  try{localStorage.setItem('dash-v1',JSON.stringify({data:{policia:data.policia.map(compress),bomberos:data.bomberos.map(compress)},nextId,cupo}));}catch(e){}
  pushData();
}
function loadData(){
  try{
    const r=JSON.parse(localStorage.getItem('dash-v1')||'null');
    if(r&&r.data){data={policia:(r.data.policia||[]).map(expand),bomberos:(r.data.bomberos||[]).map(expand)};nextId=r.nextId||1;if(r.cupo)cupo=r.cupo;return true;}
  }catch(e){}
  return false;
}

function showView(v){view=v;updateNav();render();}
function updateNav(){
  const views=['resumen','embudo','causales','genero','nat','proyeccion','postulantes','merito'];

  views.forEach((v,i)=>{

  });
}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

        <div class="cupo-bar"><div class="cupo-fill" style="width:${pctT}%;background:${ac()}"></div></div>

function renderCausales(){
  const p=ps();
  const allNAT={},allNAD={};
  p.forEach(x=>ETAPAS.forEach(e=>{
    const et=x.etapas[e.key]||{};
    if(et.resultado==='NAT'&&et.causal)allNAT[et.causal]=(allNAT[et.causal]||0)+1;
    if(et.resultado==='NAD'&&et.causal)allNAD[et.causal]=(allNAD[et.causal]||0)+1;
  }));
  const topNAT=Object.entries(allNAT).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const topNAD=Object.entries(allNAD).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const barHtml=(items,color)=>items.length===0?'<div class="emp">Sin datos registrados</div>':items.map(([c,n])=>`
    <div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">
        <span style="color:#333">${c}</span><span style="font-weight:700;color:${color}">${n}</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${Math.round(n/items[0][1]*100)}%;background:${color}"></div></div>
    </div>`).join('');
  let html=`<div class="g2">
    <div class="cc"><div class="ct" style="color:#E65100">Top causales NAT</div>${barHtml(topNAT,'#E65100')}</div>
    <div class="cc"><div class="ct" style="color:#C62828">Top causales NAD</div>${barHtml(topNAD,'#C62828')}</div>
  </div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px">`;
  ETAPAS.forEach(e=>{
    const nat=p.filter(x=>(x.etapas[e.key]||{}).resultado==='NAT').length;
    const nad=p.filter(x=>(x.etapas[e.key]||{}).resultado==='NAD').length;
    const cc={};
    p.forEach(x=>{const et=x.etapas[e.key]||{};if((et.resultado==='NAT'||et.resultado==='NAD')&&et.causal)cc[et.causal]=(cc[et.causal]||0)+1;});
    const sorted=Object.entries(cc).sort((a,b)=>b[1]-a[1]);
    const mx=sorted[0]?sorted[0][1]:1;
    html+=`<div class="cc"><div class="ct">${e.label}</div>
      <div style="display:flex;gap:6px;margin-bottom:8px"><span class="bk b-nat">NAT: ${nat}</span><span class="bk b-nad">NAD: ${nad}</span></div>
      ${sorted.length===0?'<div style="color:#bbb;font-size:11px;text-align:center;padding:6px">Sin causales registradas</div>':sorted.slice(0,6).map(([c,n])=>`
        <div style="margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px"><span style="color:#444">${c}</span><span style="font-weight:700">${n}</span></div>
          <div class="prog-bar"><div class="prog-fill" style="width:${Math.round(n/mx*100)}%;background:${ac()}"></div></div>
        </div>`).join('')}
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('v-causales').innerHTML=html;
}

function renderProyeccion(){
  const p=ps(),cq=cupo[cuerpo]||{total:0,m:0,f:0};
  const aptos=p.filter(x=>calcEstado(x)==='apto_final').length;
  const pipeline=p.filter(x=>['en_proceso','nat'].includes(calcEstado(x))).length;
  const excl=p.filter(x=>['nad','baja'].includes(calcEstado(x))).length;
  const base=p.length-excl||1;
  const tasa=Math.round(aptos/base*100);
  const proyectados=aptos+Math.round(pipeline*tasa/100);
  const gap=cq.total-proyectados;
  const aptoM=p.filter(x=>x.sexo==='M'&&calcEstado(x)==='apto_final').length;
  const aptoF=p.filter(x=>x.sexo==='F'&&calcEstado(x)==='apto_final').length;
  const pipM=p.filter(x=>x.sexo==='M'&&['en_proceso','nat'].includes(calcEstado(x))).length;
  const pipF=p.filter(x=>x.sexo==='F'&&['en_proceso','nat'].includes(calcEstado(x))).length;
  const proyM=aptoM+Math.round(pipM*tasa/100);
  const proyF=aptoF+Math.round(pipF*tasa/100);
  document.getElementById('v-proyeccion').innerHTML=`
    <div class="stats">
      <div class="sc"><div class="sl">Aptos confirmados</div><div class="sv" style="color:#2E7D32">${aptos}</div></div>
      <div class="sc"><div class="sl">Cupo habilitado</div><div class="sv">${cq.total}</div></div>
      <div class="sc"><div class="sl">Proyección final</div><div class="sv" style="color:${ac()}">${proyectados}</div></div>
      <div class="sc"><div class="sl">Gap vs cupo</div><div class="sv" style="color:${gap>0?'#C62828':'#2E7D32'}">${gap>0?'-'+gap:gap===0?'0':'+'+Math.abs(gap)}</div></div>
      <div class="sc"><div class="sl">Tasa aprobación</div><div class="sv">${tasa}%</div></div>
    </div>
    <div class="g2">
      <div class="cc"><div class="ct">Proyección hombres</div>
        <div style="font-size:28px;font-weight:700;color:#0097A7">${proyM}<span style="font-size:13px;color:#888;font-weight:400"> est. / ${cq.m} cupo</span></div>
        <div class="cupo-bar" style="height:10px;margin-top:8px"><div class="cupo-fill" style="width:${cq.m>0?Math.min(100,Math.round(proyM/cq.m*100)):0}%;background:#0097A7"></div></div>
        <div style="font-size:11px;color:#888;margin-top:5px">Confirmados: ${aptoM} | Pipeline: ${pipM}</div>
      </div>
      <div class="cc"><div class="ct">Proyección mujeres</div>
        <div style="font-size:28px;font-weight:700;color:#7B1FA2">${proyF}<span style="font-size:13px;color:#888;font-weight:400"> est. / ${cq.f} cupo</span></div>
        <div class="cupo-bar" style="height:10px;margin-top:8px"><div class="cupo-fill" style="width:${cq.f>0?Math.min(100,Math.round(proyF/cq.f*100)):0}%;background:#7B1FA2"></div></div>
        <div style="font-size:11px;color:#888;margin-top:5px">Confirmadas: ${aptoF} | Pipeline: ${pipF}</div>
      </div>
    </div>
    <div class="cc" style="background:#FFFDE7;border-color:#FDD835">
      <div class="ct">Cómo se calcula</div>
      <div style="font-size:12px;color:#555;line-height:1.8">
        Tasa de aprobación actual: <strong>${tasa}%</strong> (aptos / postulantes activos).<br>
        Proyección = aptos confirmados + pipeline × tasa de aprobación.<br>
        Se actualiza automáticamente cada vez que se carga un resultado.
      </div>
    </div>`;
}

      <div id="lista-filtros" style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <input id="f-q" type="text" placeholder="Buscar nombre o DNI..."
          style="flex:1;min-width:150px;padding:7px 10px;font-size:12px;border:1.5px solid #D0D5DD;border-radius:8px;background:#fff"
          oninput="fq=this.value;renderTabla()">
        <select id="f-e" style="padding:7px 10px;font-size:12px;border:1.5px solid #D0D5DD;border-radius:8px;background:#fff" onchange="fEstado=this.value;renderTabla()">
          <option value="">Todos los estados</option>
          ${Object.entries(ESTADO_LABELS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
        </select>
        <select id="f-s" style="padding:7px 10px;font-size:12px;border:1.5px solid #D0D5DD;border-radius:8px;background:#fff" onchange="fSexo=this.value;renderTabla()">
          <option value="">Todos los sexos</option>
          <option value="M">Hombres</option>
          <option value="F">Mujeres</option>
        </select>
      </div>
      <div style="background:#fff;border-radius:10px;border:1px solid #E8EBF0;overflow:hidden">
        <div class="tw"><table>
          <thead><tr><th>#</th><th>Nombre</th><th>DNI</th><th>S</th><th>E</th><th>Curso</th><th>Estado</th><th>Última etapa</th><th></th></tr></thead>
          <tbody id="lista-tbody"></tbody>
        </table></div>
      </div>
      <div id="lista-count" style="font-size:11px;color:#888;margin-top:6px"></div>`;
  }
  renderTabla();
}

function renderTabla(){
  const q=fq.toLowerCase();
  const list=ps().filter(p=>{
    if(q&&!p.nombre.toLowerCase().includes(q)&&!p.dni.includes(q))return false;
    if(fEstado&&calcEstado(p)!==fEstado)return false;
    if(fSexo&&p.sexo!==fSexo)return false;
    return true;
  });
  let lastEt;
  const rows=list.length?list.map((p,i)=>{
    lastEt='—';
    for(let j=ETAPAS.length-1;j>=0;j--){if((p.etapas[ETAPAS[j].key]||{}).resultado){lastEt=ETAPAS[j].label;break;}}
    return`<tr>
      <td style="color:#999;font-size:11px">${i+1}</td>
      <td style="font-weight:600;min-width:150px">${p.nombre}</td>
      <td style="font-family:monospace;font-size:11px">${p.dni}</td>
      <td style="text-align:center">${p.sexo||'—'}</td>
      <td style="text-align:center">${p.edad||'—'}</td>
      <td style="font-size:11px;color:#888">${p.curso||'—'}</td>
      <td>${estadoBadge(calcEstado(p))}</td>
      <td style="font-size:11px;color:#555">${lastEt}</td>
      <td><div style="display:flex;gap:4px">
        <button class="btn btn-sm" onclick="openModal(${p.id})">Editar</button>
        <button class="btn btn-sm btn-d" onclick="delP(${p.id})">×</button>
      </div></td>
    </tr>`;}).join(''):`<tr><td colspan="9" class="emp">No hay resultados.</td></tr>`;
  const tb=document.getElementById('lista-tbody');
  const ct=document.getElementById('lista-count');
  if(tb)tb.innerHTML=rows;
  if(ct)ct.textContent=`Mostrando ${list.length} de ${ps().length} postulantes`;
}

function openModal(id){
  editId=id;
  const p=id?ps().find(x=>x.id===id):emptyP(null);
  document.getElementById('modal-t').textContent=p&&id?`Editar — ${p.nombre}`:`Nuevo postulante — ${cl()}`;
  const etapasHtml=ETAPAS.map(e=>{
    const et=(p.etapas||{})[e.key]||{};
    const res=et.resultado||'',caus=et.causal||'',det=et.detalle||'',punt=et.puntaje||'';
    const show=res==='NAT'||res==='NAD';
    const causales=CAUSALES[e.key]||{nat:[],nad:[]};
    const cops=res==='NAT'?causales.nat:res==='NAD'?causales.nad:[...causales.nat,...causales.nad];
    return`<div style="background:#F9FAFB;border-radius:8px;padding:10px;border:1px solid #E8EBF0">
      <div style="font-size:11px;font-weight:700;color:${ac()};margin-bottom:8px;text-transform:uppercase">${e.label}</div>
      <div style="display:grid;grid-template-columns:${e.key==='entrevistaPolicial'?'1fr 80px':'1fr'};gap:6px;margin-bottom:6px">
        <div><label class="fl">Resultado</label>
          <select class="fi" id="me-${e.key}" onchange="onResChange('${e.key}',this.value)">
            ${R_OPS.map(o=>`<option value="${o}"${res===o?' selected':''}>${o||'—'}</option>`).join('')}
          </select>
        </div>
        ${e.key==='entrevistaPolicial'?`<div><label class="fl">Puntaje</label>
          <input class="fi" id="mp-${e.key}" type="number" min="1" max="5" step="0.1" value="${punt}" placeholder="1-5" oninput="calcPuntaje()">
        </div>`:''}
      </div>
      ${NOTAS_MERITO.some(n=>n.key===e.key)?`<div style="margin-bottom:6px">
        <label class="fl">Nota (orden de mérito)</label>
        <select class="fi" id="mn-${e.key}" style="border-color:#7B1FA2">
          ${N_OPS.map(o=>`<option value="${o}" ${et.nota===o?'selected':''}>${o||'—'}</option>`).join('')}
        </select>
      </div>`:''}
      <div id="cw-${e.key}" style="display:${show?'block':'none'}">
        <label class="fl">Causal</label>
        <select class="fi ${res==='NAT'?'cnat':res==='NAD'?'cnad':''}" id="mc-${e.key}" style="margin-bottom:6px">
          <option value="">— Seleccionar causal —</option>
          ${cops.map(c=>`<option value="${c}"${caus===c?' selected':''}>${c}</option>`).join('')}
        </select>
        <label class="fl">Detalle (opcional)</label>
        <input class="fi" id="md-${e.key}" type="text" value="${det}" placeholder="Observaciones...">
      </div>
    </div>`;
  }).join('');
  document.getElementById('modal-body').innerHTML=`
    <div class="sd">Datos personales</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px">
      <div style="grid-column:span 2"><label class="fl">Apellido y Nombre *</label><input class="fi" id="mn" type="text" value="${p.nombre}" placeholder="García, Carlos Alberto"></div>
      <div><label class="fl">DNI *</label><input class="fi" id="mdni" type="text" value="${p.dni}" placeholder="25.678.901"></div>
      <div><label class="fl">Sexo</label><select class="fi" id="ms"><option value="">—</option><option value="M"${p.sexo==='M'?' selected':''}>M — Hombre</option><option value="F"${p.sexo==='F'?' selected':''}>F — Mujer</option></select></div>
      <div><label class="fl">Edad</label><input class="fi" id="medad" type="number" min="18" max="60" value="${p.edad||''}" placeholder="25"></div>
      <div><label class="fl">Curso</label><input class="fi" id="mcurso" type="text" value="${p.curso||''}" placeholder="2024-A"></div>
      <div style="grid-column:span 2"><label class="fl">Estado manual</label>
        <select class="fi" id="mem"><option value="">Automático</option><option value="baja"${p.estadoManual==='baja'?' selected':''}>Baja voluntaria</option></select>
      </div>
    </div>
    <div class="sd">Etapas del proceso</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px;margin-bottom:12px">${etapasHtml}</div>
    <div class="ferr" id="ferr"></div>
    <div style="display:flex;gap:8px">
      <button class="btn ${cuerpo==='policia'?'btn-p':'btn-b'}" onclick="saveP()">Guardar</button>
      <button class="btn" onclick="closeModal()">Cancelar</button>
    </div>`;
  document.getElementById('modal-wrap').className='overlay open';
}

function onResChange(key,val){
  const wrap=document.getElementById('cw-'+key);
  const sel=document.getElementById('mc-'+key);
  if(wrap)wrap.style.display=(val==='NAT'||val==='NAD')?'block':'none';
  if(sel){
    sel.className='fi '+(val==='NAT'?'cnat':val==='NAD'?'cnad':'');
    const c=CAUSALES[key]||{nat:[],nad:[]};
    const ops=val==='NAT'?c.nat:val==='NAD'?c.nad:[...c.nat,...c.nad];
    sel.innerHTML='<option value="">— Seleccionar causal —</option>'+ops.map(o=>`<option value="${o}">${o}</option>`).join('');
  }
}
function calcPuntaje(){
  const pEl=document.getElementById('mp-entrevistaPolicial');
  const rEl=document.getElementById('me-entrevistaPolicial');
  if(!pEl||!rEl)return;
  const v=parseFloat(pEl.value);
  if(!isNaN(v)){const res=v>=4?'Apto':v===3?'NAT':'NAD';rEl.value=res;onResChange('entrevistaPolicial',res);}
}
function closeModal(){document.getElementById('modal-wrap').className='overlay';editId=null;}
function saveP(){
  const nombre=(document.getElementById('mn').value||'').trim();
  const dni=(document.getElementById('mdni').value||'').trim();
  const err=document.getElementById('ferr');
  if(!nombre||!dni){err.textContent='Nombre y DNI son obligatorios.';err.style.display='block';return;}
  err.style.display='none';
  const etapas={};
  ETAPAS.forEach(e=>{etapas[e.key]={
    resultado:document.getElementById('me-'+e.key)?.value||'',
    causal:document.getElementById('mc-'+e.key)?.value||'',
    detalle:document.getElementById('md-'+e.key)?.value||'',
    puntaje:document.getElementById('mp-'+e.key)?.value||'',
    nota:document.getElementById('mn-'+e.key)?.value||'',
  };});
  const obj={nombre,dni,sexo:document.getElementById('ms').value,edad:parseInt(document.getElementById('medad').value)||null,
    curso:document.getElementById('mcurso').value.trim(),estadoManual:document.getElementById('mem').value,etapas};
  if(editId){const i=data[cuerpo].findIndex(p=>p.id===editId);if(i>=0)data[cuerpo][i]={...data[cuerpo][i],...obj};}
  else data[cuerpo].push({id:nextId++,...obj});
  saveData();closeModal();render();
}
function delP(id){
  if(!confirm('¿Eliminar este postulante?'))return;
  data[cuerpo]=data[cuerpo].filter(p=>p.id!==id);
  saveData();renderTabla();
}

function openCupoModal(){
  const cq=cupo[cuerpo]||{total:0,m:0,f:0};
  document.getElementById('cupo-t').textContent='Cupo — '+cl();
  document.getElementById('cupo-body').innerHTML=`
    <div style="display:grid;gap:10px;margin-bottom:14px">
      <div><label class="fl">Cupo total habilitado</label><input class="fi" id="cqt" type="number" min="0" value="${cq.total}"></div>
      <div><label class="fl">Cupo hombres</label><input class="fi" id="cqm" type="number" min="0" value="${cq.m}"></div>
      <div><label class="fl">Cupo mujeres</label><input class="fi" id="cqf" type="number" min="0" value="${cq.f}"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn ${cuerpo==='policia'?'btn-p':'btn-b'}" onclick="saveCupo()">Guardar</button>
      <button class="btn" onclick="closeCupoModal()">Cancelar</button>
    </div>`;
  document.getElementById('cupo-wrap').className='overlay open';
}
function closeCupoModal(){document.getElementById('cupo-wrap').className='overlay';}
function saveCupo(){
  cupo[cuerpo]={total:parseInt(document.getElementById('cqt').value)||0,m:parseInt(document.getElementById('cqm').value)||0,f:parseInt(document.getElementById('cqf').value)||0};
  saveData();closeCupoModal();render();
}
window.onclick=function(e){if(e.target===document.getElementById('modal-wrap'))closeModal();if(e.target===document.getElementById('cupo-wrap'))closeCupoModal();};

function lbadge(v){
  if(!v)return'<span style="color:#bbb">—</span>';
  const m={A:'#E8F5E9;#2E7D32',B:'#E3F2FD;#1565C0',C:'#FFF3E0;#E65100',D:'#FFEBEE;#C62828'};
  const[bg,fg]=(m[v]||'#F5F5F5;#555').split(';');
  const extra=v==='D'?'border:2px solid #E53935;':'';
  return`<span class="bk" style="background:${bg};color:${fg};${extra}font-weight:700">${v}</span>`;
}
function calcProm(x){
  const notas=NOTAS_MERITO.map(n=>(x.etapas[n.key]||{}).nota||'');
  if(notas.some(n=>!['A','B','C','D'].includes(n)))return null;
  return notas.reduce((s,n)=>s+LV[n],0)/notas.length;
}
function renderMerito(){
  const p=ps();
  const sorted=p
    .map(x=>({...x,prom:calcProm(x)}))
    .filter(x=>x.prom!==null)
    .sort((a,b)=>b.prom-a.prom);
  const rkColors=['#FFF8E1;#F57F17','#F5F5F5;#616161','#F1F8E9;#33691E'];
  document.getElementById('v-merito').innerHTML=`
    <div class="cc" style="margin-bottom:10px;background:#F3E5F5;border-color:#CE93D8">
      <div style="font-size:12px;color:#6A1B9A;line-height:1.7">
        <strong>Escala:</strong> A = 4 pts &nbsp;|&nbsp; B = 3 pts &nbsp;|&nbsp; C = 2 pts &nbsp;|&nbsp; D = 1 pt &nbsp;|&nbsp;
        <strong>Etapas:</strong> Psicología 2da · Atletismo · Entrevista Policial · Intelectual<br>
        El promedio se calcula <strong>solo cuando las 5 notas están cargadas</strong>. Las D se resaltan en rojo.
      </div>
    </div>
    <div class="cc">
      <div class="ct">Orden de mérito — ${cl()}</div>
      ${sorted.length===0?'<div class="emp">No hay postulantes con las 5 notas completas todavía.</div>':`
      <div class="tw"><table>
        <thead><tr>
          <th style="width:50px">Pos.</th>
          <th>Nombre</th><th>DNI</th><th>Sexo</th><th>Edad</th><th>Curso</th>
          ${NOTAS_MERITO.map(n=>`<th style="text-align:center">${n.label}</th>`).join('')}
          <th style="text-align:center">Cálculo</th>
          <th style="text-align:center">Promedio</th>
        </tr></thead>
        <tbody>${sorted.map((x,i)=>{
          const[bg,fg]=(rkColors[i]||'#FAFAFA;#555').split(';');
          const notas=NOTAS_MERITO.map(n=>(x.etapas[n.key]||{}).nota||'');
          const calculo=notas.map(n=>n+'('+LV[n]+')').join('+')+' = '+notas.reduce((s,n)=>s+LV[n],0)+'/'+NOTAS_MERITO.length;
          return`<tr>
            <td><span style="display:inline-flex;width:28px;height:28px;border-radius:50%;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:${bg};color:${fg}">${i+1}</span></td>
            <td style="font-weight:700;min-width:140px">${x.nombre}</td>
            <td style="font-family:monospace;font-size:11px">${x.dni}</td>
            <td style="text-align:center">${x.sexo||'—'}</td>
            <td style="text-align:center">${x.edad||'—'}</td>
            <td style="font-size:11px;color:#888">${x.curso||'—'}</td>
            ${notas.map(n=>`<td style="text-align:center">${lbadge(n)}</td>`).join('')}
            <td style="font-family:monospace;font-size:10px;color:#888;white-space:nowrap">${calculo}</td>
            <td style="text-align:center;font-weight:700;font-size:16px;color:${ac()}">${x.prom.toFixed(2)}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`}
    </div>`;
}

async function init(){
  if(!loadData()){const s=sampleData();data={policia:s.policia,bomberos:s.bomberos};nextId=s.nextId;cupo=s.cupo;}
  setSyncStatus('loading','Conectando...');
  await pullData();
  if(syncTimer)clearInterval(syncTimer);
  syncTimer=setInterval(()=>pullData(),30000);
  setCuerpo('policia');
}
init();
</script>
</body>
</html>
