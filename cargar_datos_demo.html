function compress(p){
  const e={};
  const ETAPAS=['psico1','psico2','entrevistaPers','entrevistaPolicial','medico','atletismo','intelectual','socioambiental','documentacion'];
  ETAPAS.forEach(k=>{
    const v=p.etapas[k]||{};
    if(v.resultado||v.causal||v.nota||v.detalle||v.puntaje){
      e[k]={};
      if(v.resultado)e[k].r=v.resultado;
      if(v.causal)e[k].c=v.causal;
      if(v.nota)e[k].n=v.nota;
      if(v.detalle)e[k].d=v.detalle;
      if(v.puntaje)e[k].p=v.puntaje;
    }
  });
  const r={id:p.id,n:p.nombre,d:p.dni,e};
  if(p.sexo)r.s=p.sexo;
  if(p.edad)r.a=p.edad;
  if(p.curso)r.c=p.curso;
  return r;
}
